<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中華航空 B777-300ER 飛態即時監控</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0b132b;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
    }
    #info-box {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(10, 25, 47, 0.85);
      border: 1px solid #1c2541;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(8px);
      z-index: 10;
      min-width: 220px;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
      color: #64ffda;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .data-row {
      margin: 8px 0;
      font-size: 0.95rem;
    }
    .status-online {
      color: #00ff88;
      font-weight: bold;
    }
    .status-offline {
      color: #ff4d4d;
      font-weight: bold;
    }
  </style>
  <!-- 引入 Three.js 3D 引擎 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="info-box">
    <h2>✈️ 華航 B777 姿態監控</h2>
    <div class="data-row">俯仰角 (Pitch): <span id="pitch-val">0.0</span>°</div>
    <div class="data-row">翻滾角 (Roll): <span id="roll-val">0.0</span>°</div>
    <hr style="border: 0.5px solid #1c2541; margin: 12px 0;">
    <div class="data-row">連線狀態: <span id="status" class="status-offline">離線中...</span></div>
  </div>

  <script>
    // 1. 初始化 Three.js 場景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1128);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 光源設定
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 15);
    scene.add(dirLight);

    // 2. 建立華航 Boeing 777 3D 模型
    const airplane = new THREE.Group();

    // 機身 (Fuselage) - 華航白
    const bodyGeo = new THREE.CylinderGeometry(0.9, 0.8, 14, 32);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf8f9fa, roughness: 0.3 });
    const fuselage = new THREE.Mesh(bodyGeo, bodyMat);
    fuselage.rotation.x = Math.PI / 2;
    airplane.add(fuselage);

    // 機鼻 (Nose)
    const noseGeo = new THREE.ConeGeometry(0.9, 2.5, 32);
    const noseMat = new THREE.MeshStandardMaterial({ color: 0x1c2541 });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.rotation.x = -Math.PI / 2;
    nose.position.z = 8.25;
    airplane.add(nose);

    // 主翼 (Main Wings) - 雙發動機長程長翼
    const wingGeo = new THREE.BoxGeometry(18, 0.1, 2.5);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0xd1d5db });
    const wings = new THREE.Mesh(wingGeo, wingMat);
    wings.position.set(0, 0, 1);
    airplane.add(wings);

    // 發動機 (B777 巨型 GE90 引擎 x2)
    const engineGeo = new THREE.CylinderGeometry(0.55, 0.55, 2.2, 16);
    const engineMat = new THREE.MeshStandardMaterial({ color: 0x4b5563, metalness: 0.8 });
    
    const leftEngine = new THREE.Mesh(engineGeo, engineMat);
    leftEngine.rotation.x = Math.PI / 2;
    leftEngine.position.set(-3.5, -0.6, 1);
    airplane.add(leftEngine);

    const rightEngine = new THREE.Mesh(engineGeo, engineMat);
    rightEngine.rotation.x = Math.PI / 2;
    rightEngine.position.set(3.5, -0.6, 1);
    airplane.add(rightEngine);

    // 垂直尾翼 (Vertical Tail) - 華航粉紅梅花意象塗裝
    const tailGeo = new THREE.BoxGeometry(0.15, 3.2, 2.2);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xff85a1 }); // 華航梅花粉紅色
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(0, 1.8, -6.2);
    tail.rotation.x = -Math.PI / 6;
    airplane.add(tail);

    // 水平尾翼 (Horizontal Tail)
    const hTailGeo = new THREE.BoxGeometry(6, 0.08, 1.5);
    const hTail = new THREE.Mesh(hTailGeo, wingMat);
    hTail.position.set(0, 0.3, -6.5);
    airplane.add(hTail);

    scene.add(airplane);

    // 3. 即時數據讀取與動畫處理
    let lastDataTime = 0;
    const FIREBASE_URL = "https://your-project-id-default-rtdb.firebaseio.com/airplane.json"; // 請替換成您的 Firebase 網址

    function fetchData() {
      fetch(FIREBASE_URL)
        .then(res => res.json())
        .then(data => {
          if (data && data.pitch !== undefined && data.roll !== undefined) {
            // 轉換為弧度 (Radian) 並即時旋轉 B777 模型
            airplane.rotation.x = THREE.MathUtils.degToRad(data.pitch);
            airplane.rotation.z = THREE.MathUtils.degToRad(-data.roll);

            // 更新 UI 數據
            document.getElementById('pitch-val').innerText = data.pitch.toFixed(1);
            document.getElementById('roll-val').innerText = data.roll.toFixed(1);
            
            // 更新狀態為正常
            const statusElem = document.getElementById('status');
            statusElem.innerText = "正常連線中";
            statusElem.className = "status-online";
            
            lastDataTime = Date.now();
          }
        })
        .catch(err => console.log("等待資料中..."));
    }

    // 每 200ms 輪詢更新數據
    setInterval(fetchData, 200);

    // 4. 超時斷電判定 (超過 3 秒沒有新數據即自動切換為離線)
    setInterval(() => {
      if (Date.now() - lastDataTime > 3000) {
        const statusElem = document.getElementById('status');
        statusElem.innerText = "設備已離線 (無電源/訊號)";
        statusElem.className = "status-offline";
      }
    }, 1000);

    // 5. 渲染畫面的 Loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // 視窗大小自適應
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
