<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>波音客機 3D 即時姿態與跌倒監控</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; color: white; }
    
    #ui { 
      position: absolute; top: 20px; left: 20px; z-index: 10; 
      background: rgba(15, 23, 42, 0.85); padding: 20px; border-radius: 12px; 
      border: 1px solid #334155; min-width: 240px; 
    }
    h2 { margin: 0 0 10px 0; font-size: 18px; color: #38bdf8; }
    p { margin: 6px 0; font-size: 15px; }
    
    #alertBanner {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      padding: 15px 0;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.6);
      animation: flash 0.6s infinite alternate;
    }

    @keyframes flash {
      from { background-color: #dc2626; }
      to { background-color: #7f1d1d; }
    }
  </style>
  <!-- 三維繪圖庫 Three.js 與 GLTF 模型載入器 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

  <div id="alertBanner">🚨 警告：偵測到長者意外跌倒！請立刻確認狀況！</div>

  <div id="ui">
    <h2>✈️ 波音客機姿態與防護監控</h2>
    <p>姿態 (Pitch): <span id="pitchVal">0</span>°</p>
    <p>姿勢 (Roll): <span id="rollVal">0</span>°</p>
    <hr style="border-color: #334155; margin: 10px 0;">
    <p>安全狀態: <span id="statusVal" style="color: #4ade80; font-weight: bold;">正常活動中</span></p>
    <p>最近撞擊 G 力: <span id="gVal">0.0</span> G</p>
  </div>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 環境光與平行光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    let boeingModel = null;
    let targetPitch = 0;
    let targetRoll = 0;

    // 載入精細 3D 飛機模型
    const loader = new THREE.GLTFLoader();
    loader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Airplane/glTF/Airplane.gltf', (gltf) => {
      boeingModel = gltf.scene;
      boeingModel.scale.set(0.008, 0.008, 0.008); // 縮放適當大小
      scene.add(boeingModel);
    }, undefined, (error) => {
      console.error("模型載入失敗：", error);
    });

    camera.position.set(0, 2.5, 5);
    camera.lookAt(0, 0, 0);

    const planeUrl = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/plane.json";
    const fallUrl  = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/fall_alert.json";

    // 讀取姿態 (目標角度)
    async function fetchPlane() {
      try {
        const res = await fetch(planeUrl);
        const data = await res.json();
        if (data) {
          document.getElementById('pitchVal').innerText = data.pitch;
          document.getElementById('rollVal').innerText = data.roll;

          // 更新目標角度 (單位: 弧度)
          targetPitch = data.pitch * (Math.PI / 180);
          targetRoll = -data.roll * (Math.PI / 180);
        }
      } catch (err) { console.error(err); }
    }

    // 讀取跌倒警報
    async function fetchFallAlert() {
      try {
        const res = await fetch(fallUrl);
        const data = await res.json();
        if (data) {
          const banner = document.getElementById('alertBanner');
          const statusText = document.getElementById('statusVal');
          const gText = document.getElementById('gVal');

          if (data.impactG) gText.innerText = data.impactG;

          if (data.isFallen) {
            banner.style.display = 'block';
            statusText.innerText = '🚨 意外跌倒中！';
            statusText.style.color = '#ef4444';
          } else {
            banner.style.display = 'none';
            statusText.innerText = '正常活動中';
            statusText.style.color = '#4ade80';
          }
        }
      } catch (err) { console.error(err); }
    }

    // 將查詢頻率調整為 80ms~150ms 避免卡頓
    setInterval(fetchPlane, 80);
    setInterval(fetchFallAlert, 150);

    // 60FPS 動畫渲染迴圈：採用 Lerp 平滑插值
    function animate() {
      requestAnimationFrame(animate);

      if (boeingModel) {
        // 使用 0.15 平滑接近目標角度，解決卡頓與硬跳轉問題
        boeingModel.rotation.x += (targetPitch - boeingModel.rotation.x) * 0.15;
        boeingModel.rotation.z += (targetRoll - boeingModel.rotation.z) * 0.15;
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
