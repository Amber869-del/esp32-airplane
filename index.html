<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>長者跌倒防護與 3D 波音客機姿態即時監控系統</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; color: white; }
    
    /* 儀表板樣式 */
    #ui { 
      position: absolute; top: 20px; left: 20px; z-index: 10; 
      background: rgba(15, 23, 42, 0.85); padding: 20px; border-radius: 12px; 
      border: 1px solid #334155; min-width: 240px; 
    }
    h2 { margin: 0 0 10px 0; font-size: 18px; color: #38bdf8; }
    p { margin: 6px 0; font-size: 15px; }
    
    /* 跌倒緊急警報橫幅 */
    #alertBanner {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      padding: 15px 0;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.6);
      animation: flash 0.6s infinite alternate;
    }

    @keyframes flash {
      from { background-color: #dc2626; }
      to { background-color: #7f1d1d; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- 全螢幕跌倒警報通知欄 -->
  <div id="alertBanner">🚨 警告：偵測到長者意外跌倒！請立刻確認狀況！</div>

  <div id="ui">
    <h2>✈️ 波音客機姿態與防護監控</h2>
    <p>姿態 (Pitch): <span id="pitchVal">0</span>°</p>
    <p>姿勢 (Roll): <span id="rollVal">0</span>°</p>
    <hr style="border-color: #334155; margin: 10px 0;">
    <p>安全狀態: <span id="statusVal" style="color: #4ade80; font-weight: bold;">正常活動中</span></p>
    <p>最近撞擊 G 力: <span id="gVal">0.0</span> G</p>
  </div>

  <script>
    // 1. 初始化 3D 場景
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // ================= 建立 3D 波音客機 (Boeing) 模型 =================
    const boeingPlane = new THREE.Group();

    // 材質設定 (白色機身 + 波音藍標誌色)
    const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.3 });
    const blueMat  = new THREE.MeshStandardMaterial({ color: 0x0284c7, roughness: 0.3 });
    const engineMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.8, roughness: 0.2 });

    // 1. 波音圓柱形機身 (Fuselage)
    const bodyGeo = new THREE.CylinderGeometry(0.35, 0.35, 4.2, 32);
    bodyGeo.rotateX(Math.PI / 2);
    const body = new THREE.Mesh(bodyGeo, whiteMat);
    boeingPlane.add(body);

    // 2. 機鼻 (Nose Cone)
    const noseGeo = new THREE.ConeGeometry(0.35, 0.9, 32);
    noseGeo.rotateX(-Math.PI / 2);
    const nose = new THREE.Mesh(noseGeo, whiteMat);
    nose.position.set(0, 0, 2.55);
    boeingPlane.add(nose);

    // 3. 機尾圓錐 (Tail Cone)
    const tailConeGeo = new THREE.ConeGeometry(0.35, 1.0, 32);
    tailConeGeo.rotateX(Math.PI / 2);
    const tailCone = new THREE.Mesh(tailConeGeo, whiteMat);
    tailCone.position.set(0, 0, -2.6);
    boeingPlane.add(tailCone);

    // 4. 波音後掠式主機翼 (Main Swept Wings)
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);
    wingShape.lineTo(2.8, -0.8);
    wingShape.lineTo(2.7, -1.3);
    wingShape.lineTo(0, -0.7);
    wingShape.closePath();

    const extrudeSettings = { depth: 0.04, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.01, bevelThickness: 0.01 };
    const wingGeo = new THREE.ExtrudeGeometry(wingShape, extrudeSettings);
    wingGeo.rotateX(Math.PI / 2);

    // 右機翼
    const rightWing = new THREE.Mesh(wingGeo, blueMat);
    rightWing.position.set(0.2, -0.05, 0.4);
    boeingPlane.add(rightWing);

    // 左機翼
    const leftWing = new THREE.Mesh(wingGeo, blueMat);
    leftWing.scale.set(-1, 1, 1);
    leftWing.position.set(-0.2, -0.05, 0.4);
    boeingPlane.add(leftWing);

    // 5. 波音雙噴射引擎 (Dual Engines under wings)
    const engineGeo = new THREE.CylinderGeometry(0.18, 0.16, 0.7, 24);
    engineGeo.rotateX(Math.PI / 2);

    const rightEngine = new THREE.Mesh(engineGeo, engineMat);
    rightEngine.position.set(1.0, -0.28, 0.3);
    boeingPlane.add(rightEngine);

    const leftEngine = new THREE.Mesh(engineGeo, engineMat);
    leftEngine.position.set(-1.0, -0.28, 0.3);
    boeingPlane.add(leftEngine);

    // 6. 垂直尾翼 (Vertical Tail)
    const vTailShape = new THREE.Shape();
    vTailShape.moveTo(0, 0);
    vTailShape.lineTo(0.9, 0);
    vTailShape.lineTo(0.4, 0.9);
    vTailShape.lineTo(0, 0.9);
    vTailShape.closePath();

    const vTailGeo = new THREE.ExtrudeGeometry(vTailShape, extrudeSettings);
    vTailGeo.rotateY(Math.PI / 2);
    const vTail = new THREE.Mesh(vTailGeo, blueMat);
    vTail.position.set(0, 0.35, -2.5);
    boeingPlane.add(vTail);

    scene.add(boeingPlane);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    // ================= Firebase 資料連線 =================
    const planeUrl = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/plane.json";
    const fallUrl  = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/fall_alert.json";

    // 讀取 3D 波音姿態角度
    async function fetchPlane() {
      try {
        const res = await fetch(planeUrl);
        const data = await res.json();
        if (data) {
          document.getElementById('pitchVal').innerText = data.pitch;
          document.getElementById('rollVal').innerText = data.roll;

          boeingPlane.rotation.x = data.pitch * (Math.PI / 180);
          boeingPlane.rotation.z = -data.roll * (Math.PI / 180);
        }
      } catch (err) { console.error(err); }
    }

    // 獨立監控跌倒狀態
    async function fetchFallAlert() {
      try {
        const res = await fetch(fallUrl);
        const data = await res.json();
        if (data) {
          const banner = document.getElementById('alertBanner');
          const statusText = document.getElementById('statusVal');
          const gText = document.getElementById('gVal');

          if (data.impactG) {
            gText.innerText = data.impactG;
          }

          if (data.isFallen) {
            banner.style.display = 'block';
            statusText.innerText = '🚨 意外跌倒中！';
            statusText.style.color = '#ef4444';
          } else {
            banner.style.display = 'none';
            statusText.innerText = '正常活動中';
            statusText.style.color = '#4ade80';
          }
        }
      } catch (err) { console.error(err); }
    }

    setInterval(fetchPlane, 50);
    setInterval(fetchFallAlert, 100);

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
