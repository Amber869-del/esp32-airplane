<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>波音客機姿態與跌倒防護即時監控</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
    }

    /* 左上角儀表板 */
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #334155;
      min-width: 240px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h2 { margin: 0 0 10px 0; font-size: 18px; color: #38bdf8; }
    p { margin: 6px 0; font-size: 15px; }

    /* 跌倒緊急警報橫幅 */
    #alertBanner {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #dc2626;
      color: white;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 15px 0;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.6);
      animation: flash 0.6s infinite alternate;
    }

    @keyframes flash {
      from { background-color: #dc2626; }
      to { background-color: #7f1d1d; }
    }

    /* 飛機舞台區域 */
    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px;
    }

    /* 飛機容器與 3D 姿勢轉換 */
    #planeWrapper {
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      /* CSS 動畫過渡，讓旋轉超級滑順不卡頓 */
      transition: transform 0.1s linear;
      will-change: transform;
    }

    /* 內建波音飛機圖案 (SVG Base64 高解析透明圖片) */
    .plane-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>

  <div id="alertBanner">🚨 警告：偵測到長者意外跌倒！請立刻確認狀況！</div>

  <div id="ui">
    <h2>✈️ 波音姿態與防護監控</h2>
    <p>姿態 (Pitch): <span id="pitchVal">0</span>°</p>
    <p>姿勢 (Roll): <span id="rollVal">0</span>°</p>
    <hr style="border-color: #334155; margin: 10px 0;">
    <p>安全狀態: <span id="statusVal" style="color: #4ade80; font-weight: bold;">正常活動中</span></p>
    <p>最近撞擊 G 力: <span id="gVal">0.0</span> G</p>
  </div>

  <div id="stage">
    <div id="planeWrapper">
      <!-- 直接內嵌向量飛機圖片，不用外部連線，保證 100% 顯示 -->
      <img class="plane-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%2338bdf8' d='M256 16L208 176L32 240L32 288L208 240L208 400L160 448L160 496L256 464L352 496L352 448L304 400L304 240L480 288L480 240L304 176Z'/><path fill='%230284c7' d='M256 16L208 176L256 240L304 176Z'/></svg>" alt="飛機模型">
    </div>
  </div>

  <script>
    const planeWrapper = document.getElementById('planeWrapper');
    const planeUrl = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/plane.json";
    const fallUrl  = "https://esp32-plane-f7328-default-rtdb.firebaseio.com/fall_alert.json";

    // 讀取 3D 姿態角度並即時旋轉圖片
    async function fetchPlane() {
      try {
        const res = await fetch(planeUrl);
        const data = await res.json();
        if (data) {
          const pitch = parseFloat(data.pitch) || 0;
          const roll  = parseFloat(data.roll) || 0;

          document.getElementById('pitchVal').innerText = pitch.toFixed(1);
          document.getElementById('rollVal').innerText = roll.toFixed(1);

          // 套用 3D CSS 旋轉：X軸控制俯仰 (Pitch)，Z軸控制滾轉 (Roll)
          planeWrapper.style.transform = `rotateZ(${-roll}deg) rotateX(${pitch}deg)`;
        }
      } catch (err) { console.error(err); }
    }

    // 獨立讀取跌倒警報
    async function fetchFallAlert() {
      try {
        const res = await fetch(fallUrl);
        const data = await res.json();
        if (data) {
          const banner = document.getElementById('alertBanner');
          const statusText = document.getElementById('statusVal');
          const gText = document.getElementById('gVal');

          if (data.impactG) gText.innerText = data.impactG;

          if (data.isFallen) {
            banner.style.display = 'block';
            statusText.innerText = '🚨 意外跌倒中！';
            statusText.style.color = '#ef4444';
          } else {
            banner.style.display = 'none';
            statusText.innerText = '正常活動中';
            statusText.style.color = '#4ade80';
          }
        }
      } catch (err) { console.error(err); }
    }

    // 設定定時發送與監控 (80ms 發送一次，畫面順暢不卡頓)
    setInterval(fetchPlane, 80);
    setInterval(fetchFallAlert, 150);
  </script>
</body>
</html>
